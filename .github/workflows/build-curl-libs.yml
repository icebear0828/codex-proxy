name: Build libcurl-impersonate shared libraries

# Builds dylib/so from the curl-impersonate static .a archives.
# Uploads pre-built binaries to a pinned GitHub Release so that
# `npm run setup` can download them without requiring clang on the user's machine.

on:
  push:
    branches: [master]
    paths:
      - "scripts/infra/setup-curl.ts"
      - "scripts/infra/curl_wrapper.c"
  workflow_dispatch:
    inputs:
      curl_version:
        description: "curl-impersonate version tag (e.g. v1.5.1)"
        required: false
        type: string

permissions:
  contents: write

env:
  CURL_REPO: lexiforest/curl-impersonate
  # Release tag on THIS repo where pre-built libs are stored
  LIBS_TAG: curl-libs

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            asset_arch: arm64-macos
            lib_name: libcurl-impersonate.dylib
            link_libs: "-lz -lc++ -liconv -framework Security -framework SystemConfiguration -framework CoreFoundation -framework CoreServices -licucore"
            arch_flag: "-arch arm64"
          - os: macos-13
            arch: x86_64
            asset_arch: x86_64-macos
            lib_name: libcurl-impersonate.dylib
            link_libs: "-lz -lc++ -liconv -framework Security -framework SystemConfiguration -framework CoreFoundation -framework CoreServices -licucore"
            arch_flag: "-arch x86_64"
          - os: ubuntu-latest
            arch: x86_64
            asset_arch: x86_64-linux-gnu
            lib_name: libcurl-impersonate.so
            link_libs: "-lz -lstdc++ -lpthread -ldl"
            arch_flag: ""
          - os: ubuntu-latest
            arch: aarch64
            asset_arch: aarch64-linux-gnu
            lib_name: libcurl-impersonate.so
            link_libs: "-lz -lstdc++ -lpthread -ldl"
            arch_flag: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve curl-impersonate version
        id: version
        run: |
          if [ -n "${{ inputs.curl_version }}" ]; then
            echo "tag=${{ inputs.curl_version }}" >> "$GITHUB_OUTPUT"
          else
            TAG=$(curl -s "https://api.github.com/repos/$CURL_REPO/releases/latest" | jq -r .tag_name)
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cross-compiler (Linux aarch64)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Download static library
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          ASSET="libcurl-impersonate-${VERSION}.${{ matrix.asset_arch }}.tar.gz"
          URL="https://github.com/$CURL_REPO/releases/download/${VERSION}/${ASSET}"
          echo "Downloading $URL"
          curl -L -o archive.tar.gz "$URL"
          tar xzf archive.tar.gz

      - name: Build shared library
        run: |
          WRAPPER_C="scripts/infra/curl_wrapper.c"

          if [ "${{ matrix.arch }}" = "aarch64" ] && [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            CC=aarch64-linux-gnu-gcc
          else
            CC=clang
          fi

          $CC -c ${{ matrix.arch_flag }} -fvisibility=default "$WRAPPER_C" -o curl_wrapper.o

          if [ "${{ runner.os }}" = "Linux" ]; then
            WHOLE_ARCHIVE="-Wl,--whole-archive libcurl-impersonate.a -Wl,--no-whole-archive"
          else
            WHOLE_ARCHIVE="-Wl,-all_load libcurl-impersonate.a"
          fi

          $CC -shared ${{ matrix.arch_flag }} -o "${{ matrix.lib_name }}" curl_wrapper.o \
            $WHOLE_ARCHIVE \
            ${{ matrix.link_libs }}

          echo "Built ${{ matrix.lib_name }}:"
          file "${{ matrix.lib_name }}"

      - name: Verify exports
        if: matrix.arch != 'aarch64' || matrix.os != 'ubuntu-latest'
        run: |
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            nm -gD "${{ matrix.lib_name }}" | grep "w_curl" | head -5
          else
            nm -gU "${{ matrix.lib_name }}" | grep "w_curl" | head -5
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lib_name }}-${{ matrix.asset_arch }}
          path: ${{ matrix.lib_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: libs

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in libs/*/; do
            # Artifact dir name: libcurl-impersonate.dylib-arm64-macos
            dirname=$(basename "$dir")
            lib_file=$(ls "$dir"/)
            ext="${lib_file##*.}"
            # Extract arch suffix after the lib name: strip "libcurl-impersonate.dylib-" prefix
            arch="${dirname#libcurl-impersonate.*-}"
            # Result: libcurl-impersonate-arm64-macos.dylib
            cp "$dir/$lib_file" "release/libcurl-impersonate-${arch}.${ext}"
          done
          ls -la release/

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create the release tag if it doesn't exist
          if ! gh release view "$LIBS_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$LIBS_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Pre-built libcurl-impersonate shared libraries" \
              --notes "Auto-built shared libraries for FFI transport connection pooling. Downloaded automatically by \`npm run setup\`." \
              --prerelease
          fi

          # Upload (clobber existing)
          gh release upload "$LIBS_TAG" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

name: Web Smoke Test

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  web-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build root workspace
        run: npm run build

      - name: Run web smoke test
        run: npm run test -- src/__tests__/web-smoke.test.ts

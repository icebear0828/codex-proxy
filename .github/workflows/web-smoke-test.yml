name: CI — Web Smoke Test

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run Web smoke test
        run: npm test -- src/__tests__/web-smoke.test.ts
